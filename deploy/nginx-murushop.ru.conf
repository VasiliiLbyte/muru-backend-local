# Primary site: murushop.ru (VPS: /etc/nginx/sites-available/murushop.ru).
# Apply: sudo bash deploy/sync-nginx-murushop.sh
#
# Requires: certbot certs for murushop.ru, frontend at /var/www/muru/frontend/dist,
# backend on 127.0.0.1:4000.

proxy_cache_path /var/cache/nginx/muru-img levels=1:2 keys_zone=muru_img:50m max_size=2g inactive=30d;

server {
    listen 443 ssl;
    server_name murushop.ru;

    ssl_certificate /etc/letsencrypt/live/murushop.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/murushop.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/muru/frontend/dist;
    index index.html;
    client_max_body_size 12m;

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    location /img/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_buffering on;
        proxy_cache muru_img;
        proxy_cache_valid 200 365d;
        proxy_read_timeout 30s;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # YooKassa webhooks (server-to-server). Must be before location / (SPA static).
    location /yookassa-webhook {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 256k;
    }

    location /admin/ {
        alias /var/www/muru/admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    location /uploads/ {
        alias /var/www/muru/uploads/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name www.murushop.ru;

    ssl_certificate /etc/letsencrypt/live/murushop.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/murushop.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://murushop.ru$request_uri;
}

server {
    listen 80;
    server_name murushop.ru www.murushop.ru;
    return 301 https://murushop.ru$request_uri;
}
