# Staging API only: api-staging.murushop.ru (VPS: /etc/nginx/sites-available/api-staging.murushop.ru).
# Apply MANUALLY (see PROGRESS.md U3-b) — NOT part of sync-nginx-murushop.sh (that script is prod-only).
#
# Requires: certbot cert for api-staging.murushop.ru, backend on 127.0.0.1:4001.
# No frontend static root — staging tests the API only, no mini app UI is built/served here.
# No /yookassa-webhook location — webhooks stay pointed at prod (murushop.ru/.online); staging
# checks payment status via polling only (see PROGRESS.md invariant).
server {
    listen 443 ssl;
    server_name api-staging.murushop.ru;

    ssl_certificate /etc/letsencrypt/live/api-staging.murushop.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-staging.murushop.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:4001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    server_name api-staging.murushop.ru;
    return 301 https://api-staging.murushop.ru$request_uri;
}
