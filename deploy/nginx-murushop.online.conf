# Legacy domain: permanent redirect murushop.online → murushop.ru
# VPS: /etc/nginx/sites-available/murushop.online
# Apply: sudo bash deploy/sync-nginx-murushop.sh
#
# Keep Let's Encrypt certs for murushop.online so HTTPS redirect works.
# YooKassa webhook URL should use https://murushop.ru/yookassa-webhook (not .online).

server {
    listen 443 ssl;
    server_name murushop.online www.murushop.online;

    ssl_certificate /etc/letsencrypt/live/murushop.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/murushop.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://murushop.ru$request_uri;
}

server {
    listen 80;
    server_name murushop.online www.murushop.online;
    return 301 https://murushop.ru$request_uri;
}
