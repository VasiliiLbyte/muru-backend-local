# Canonical nginx site config for murushop.online (VPS: /etc/nginx/sites-available/murushop.online).
# Apply: sudo bash deploy/sync-nginx-murushop.sh
#
# Requires: frontend built at /var/www/muru/frontend/dist, backend on 127.0.0.1:4000.

server {
    server_name murushop.online www.murushop.online;
    root /var/www/muru/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # YooKassa webhooks (server-to-server). Must be before location / (SPA static).
    location /yookassa-webhook {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 256k;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/murushop.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/murushop.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.murushop.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = murushop.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name murushop.online www.murushop.online;
    return 404; # managed by Certbot
}
